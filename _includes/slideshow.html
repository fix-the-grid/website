<!-- _includes/slideshow.html — generated by convert_posts.py
     TIP: extract the <style> and <script> blocks to a custom CSS/JS file
     to avoid them being duplicated when multiple slideshows appear on a page. -->
{%- assign _imgs = include.images | split: "|" -%}
{%- assign _sid  = include.id | default: "slideshow" -%}
<div class="wp-slideshow" id="{{ _sid }}">
  <div class="wp-slideshow__track">
    {%- for _img in _imgs %}
    <div class="wp-slide{% if forloop.first %} wp-slide--on{% endif %}"
         aria-hidden="{% unless forloop.first %}true{% endunless %}">
      <img src="{{ _img }}" alt="Slide {{ forloop.index }}" loading="lazy">
    </div>
    {%- endfor %}
  </div>
  <button class="wp-ss-btn wp-ss-btn--prev"
          onclick="wpSS('{{ _sid }}',-1)" aria-label="Previous slide">&#10094;</button>
  <button class="wp-ss-btn wp-ss-btn--next"
          onclick="wpSS('{{ _sid }}',1)"  aria-label="Next slide">&#10095;</button>
  <p class="wp-ss-counter">
    <span class="wp-ss-cur">1</span>&thinsp;/&thinsp;{{ _imgs | size }}
  </p>
</div>
<style>
.wp-slideshow{position:relative;background:#111;border-radius:6px;
  margin:1.5rem 0;overflow:hidden;user-select:none}
.wp-slideshow__track{position:relative}
.wp-slide{display:none}.wp-slide--on{display:block}
.wp-slide img{width:100%;max-height:560px;object-fit:contain;display:block}
.wp-ss-btn{position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(0,0,0,.5);color:#fff;border:none;padding:.35rem .7rem;
  font-size:1.4rem;cursor:pointer;border-radius:3px;z-index:5;line-height:1}
.wp-ss-btn--prev{left:.4rem}.wp-ss-btn--next{right:.4rem}
.wp-ss-btn:hover{background:rgba(0,0,0,.8)}
.wp-ss-counter{text-align:center;color:#aaa;font-size:.8rem;margin:.3rem 0}
</style>
<script>
(function(){
  function wpSS(id,d){
    var c=document.getElementById(id);if(!c)return;
    var s=Array.from(c.querySelectorAll('.wp-slide'));
    var i=s.findIndex(function(x){return x.classList.contains('wp-slide--on');});
    s[i].classList.remove('wp-slide--on');s[i].setAttribute('aria-hidden','true');
    var n=(i+d+s.length)%s.length;
    s[n].classList.add('wp-slide--on');s[n].removeAttribute('aria-hidden');
    c.querySelector('.wp-ss-cur').textContent=n+1;
  }
  window.wpSS=wpSS;
})();
</script>
